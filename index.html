<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 수업 전 말랑말랑 국어 퀴즈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>💡 수업 전 말랑말랑 국어 퀴즈</h1>
        <p class="subtitle">오늘의 수업을 시작하기 전, 실력을 점검해 볼까요?</p>
        
        <div id="quiz-box">
            <div class="question-number" id="question-number">문제 1 / 3</div>
            <div class="question" id="question-text">여기에 문제가 표시됩니다.</div>
            
            <div class="options">
                <button class="option-btn" onclick="selectAnswer(0)">1번 보기</button>
                <button class="option-btn" onclick="selectAnswer(1)">2번 보기</button>
                <button class="option-btn" onclick="selectAnswer(2)">3번 보기</button>
                <button class="option-btn" onclick="selectAnswer(3)">4번 보기</button>
            </div>
        </div>

        <div id="result-box" class="hide">
            <h2>🎉 퀴즈 종료!</h2>
            <p id="score-text">너의 점수는...</p>
            <button class="restart-btn" onclick="restartQuiz()">다시 도전하기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
